name: hotel_management
description: "Hotel Management System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1

  provider: ^6.1.5

  intl: ^0.20.2

  table_calendar: ^3.2.0

  google_fonts: ^6.3.0

  flutter_svg: ^2.2.0

  # Biểu đồ cho trang Tổng quan / Báo cáo
  fl_chart: ^1.1.0

  # Mã QR ảo cho trang thanh toán
  qr_flutter: ^4.1.0

  # Tải ảnh sao kê (tương thích Web)
  file_picker: ^11.0.2

  # Gọi Google Gemini AI trực tiếp từ Flutter
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true